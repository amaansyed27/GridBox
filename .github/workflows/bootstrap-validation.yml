name: Final validation report

on:
  push:
    branches: [main]
    paths-ignore:
      - .github/gridbox-ci-report.txt

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
      - name: Prepare dependencies and formatting
        run: |
          uv sync --extra dev
          cargo fmt --all
          uv run ruff check --fix python
      - name: Run complete validation
        shell: bash
        run: |
          set +e
          report=.github/gridbox-ci-report.txt
          : > "$report"
          run_check() {
            name="$1"
            shift
            echo "===== $name =====" >> "$report"
            "$@" >> "$report" 2>&1
            code=$?
            echo "EXIT_CODE=$code" >> "$report"
            echo >> "$report"
          }
          run_check "RUST VERSION" rustc --version
          run_check "CARGO FORMAT" cargo fmt --all --check
          run_check "CARGO CHECK" cargo check --workspace --all-targets
          run_check "CARGO CLIPPY" cargo clippy --workspace --all-targets -- -D warnings
          run_check "CARGO TEST" cargo test --workspace
          run_check "GRIDBOX BINARY SMOKE" cargo run -p gridbox-cli -- config-path
          run_check "FASTF1 WORKER SMOKE" bash -lc 'printf "%s\n" "{\"id\":\"smoke\",\"method\":\"ping\",\"params\":{}}" | uv run python -m gridbox_fastf1'
          run_check "RUFF" uv run ruff check python
          run_check "PYTEST" uv run pytest
      - name: Commit formatted sources and report
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "Record final validation [skip ci]"
            git push
          fi
