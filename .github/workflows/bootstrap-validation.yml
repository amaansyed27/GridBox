name: Bootstrap validation report

on:
  push:
    branches: [main]
    paths-ignore:
      - .github/gridbox-ci-report.txt

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
      - name: Apply deterministic formatting and compile fix
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path("crates/gridbox-openf1/src/client.rs")
          source = path.read_text()
          endpoints = {
              "RawDriver": "drivers",
              "RawPosition": "position",
              "RawInterval": "intervals",
              "RawLap": "laps",
              "RawStint": "stints",
              "RawRaceControl": "race_control",
              "RawWeather": "weather",
          }
          for model, endpoint in endpoints.items():
              source = source.replace(
                  f'self.get_or_default::<{model}>(&format!("{endpoint}?session_key={{key}}"))',
                  f'self.get_or_default::<{model}>(format!("{endpoint}?session_key={{key}}"))',
              )
          source = source.replace(
              "async fn get_or_default<T>(&self, path: &str) -> Vec<T>",
              "async fn get_or_default<T>(&self, path: String) -> Vec<T>",
          )
          source = source.replace(
              "        self.get(path).await.unwrap_or_default()",
              "        self.get(&path).await.unwrap_or_default()",
          )
          path.write_text(source)
          PY
          cargo fmt --all
          uv sync --extra dev
          uv run ruff check --fix python
      - name: Run checks and capture report
        shell: bash
        run: |
          set +e
          report=.github/gridbox-ci-report.txt
          : > "$report"
          run_check() {
            name="$1"
            shift
            echo "===== $name =====" >> "$report"
            "$@" >> "$report" 2>&1
            code=$?
            echo "EXIT_CODE=$code" >> "$report"
            echo >> "$report"
          }
          run_check "RUST VERSION" rustc --version
          run_check "CARGO FORMAT" cargo fmt --all --check
          run_check "CARGO CHECK" cargo check --workspace --all-targets
          run_check "CARGO CLIPPY" cargo clippy --workspace --all-targets -- -D warnings
          run_check "CARGO TEST" cargo test --workspace
          run_check "RUFF" uv run ruff check python
          run_check "PYTEST" uv run pytest
      - name: Commit formatted sources and report
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "Apply validation fixes and report [skip ci]"
            git push
          fi
